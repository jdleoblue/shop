<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shop | ByJDG</title>

  <meta name="description"
    content="Shop ByJDG creator goods featuring caps, shirts, and camera-inspired gear made for those who create with intention." />

  <style>
    :root {
      --bg: #050505;
      --bg-soft: #0b0b0b;
      --text: #f5f1ea;
      --muted: #b7b0a7;
      --line: rgba(255, 255, 255, 0.14);
      --panel: rgba(255, 255, 255, 0.045);
      --accent: #d6b36a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 7vw;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.7rem, 3vw, 2.6rem);
      letter-spacing: -0.04em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 34px;
      font-size: 0.72rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .mobile-menu-button {
      display: none;
    }

    .menu-icon {
      display: block;
    }

    .menu-icon::before {
      content: '☰';
    }

    body.menu-open .menu-icon::before {
      content: '×';
    }

    .nav-links a {
      opacity: 0.82;
      transition: opacity 0.2s ease;
      line-height: 1;
    }

    .nav-links a:hover,
    .nav-links .active {
      opacity: 1;
    }

    .nav-links .active {
      border-bottom: 1px solid var(--text);
      padding-bottom: 7px;
    }

    .hero {
      min-height: 72vh;
      display: flex;
      align-items: center;
      padding: 150px 7vw 90px;
      position: relative;
      background:
        linear-gradient(to right, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.72) 42%, rgba(0, 0, 0, 0.36) 100%),
        linear-gradient(to top, #050505 0%, rgba(5, 5, 5, 0.25) 45%, rgba(5, 5, 5, 0.05) 100%),
        url('images/merch-hero.png') center/cover no-repeat;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .hero-content {
      max-width: 620px;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.44em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(4.5rem, 12vw, 9.8rem);
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.08em;
      margin-bottom: 28px;
    }

    .hero-line {
      width: 58px;
      height: 1px;
      background: var(--text);
      margin-bottom: 24px;
      opacity: 0.8;
    }

    .hero p {
      max-width: 420px;
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 0.06em;
    }

    .shop-section {
      padding: 76px 7vw 52px;
      background: var(--bg);
    }

    .section-header {
      display: grid;
      place-items: center;
      text-align: center;
      margin-bottom: 34px;
    }

    .section-title {
      font-size: 0.86rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 12px;
    }

    .section-line {
      width: 54px;
      height: 1px;
      background: var(--text);
      opacity: 0.65;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 34px;
      flex-wrap: wrap;
    }

    .filter-button {
      min-width: 120px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
      color: var(--text);
      padding: 12px 22px;
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .filter-button.active,
    .filter-button:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.34);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .product-image {
      height: 330px;
      background: #101010;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.88;
      transition: transform 0.55s ease, opacity 0.55s ease;
    }

    .product-card:hover img {
      transform: scale(1.05);
      opacity: 1;
    }

    .product-info {
      padding: 20px 20px 24px;
    }

    .product-info h2 {
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 7px;
    }

    .product-info p {
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: 16px;
    }

    .product-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .shop-link {
      font-size: 0.66rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .footer {
      padding: 30px 7vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 22px;
      color: var(--muted);
      background: #050505;
      font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .footer-brand {
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text);
      font-size: 1.5rem;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      font-size: 0.68rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    @media (max-width: 950px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 650px) {
      .nav {
        padding: 18px 6vw;
        height: 72px;
        justify-content: center;
      }

      .logo {
        position: static;
        transform: none;
        font-size: 1.75rem;
      }

      .mobile-menu-button {
        display: block;
        background: transparent;
        border: 0;
        color: var(--text);
        font-size: 1.8rem;
        cursor: pointer;
        position: absolute;
        left: 6vw;
        top: 50%;
        transform: translateY(-50%);
        z-index: 200;
      }

      .nav-links {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        width: 100%;
        max-width: none;
        height: 36vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        gap: 20px;
        padding: 30px 24px 34px;

        background: rgba(0, 0, 0, 0.94);
        backdrop-filter: blur(18px);
        border-top: 1px solid rgba(255,255,255,0.12);
        border-right: none;

        opacity: 0;
        visibility: hidden;
        transform: translateY(100%);
        transition: transform 0.35s ease, opacity 0.25s ease;
        z-index: 150;
      }

      body.menu-open .nav-links {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
      }

      .nav-links a {
        font-size: 0.72rem;
        letter-spacing: 0.28em;
      }

      .hero {
        min-height: 62vh;
        padding: 118px 6vw 58px;
      }

      .hero h1 {
        font-size: clamp(3.1rem, 18vw, 4.8rem);
      }

      .hero p {
        font-size: 0.92rem;
      }

      .shop-section {
        padding: 54px 6vw 44px;
      }

      .filters {
        gap: 10px;
        margin-bottom: 28px;
      }

      .filter-button {
        min-width: auto;
        padding: 11px 16px;
        font-size: 0.6rem;
        letter-spacing: 0.22em;
      }

      .product-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .product-image {
        height: 260px;
      }

      .footer {
        flex-direction: column;
        text-align: center;
        padding: 34px 6vw;
        gap: 14px;
      }

      .footer-brand {
        font-size: 1.45rem;
      }

      .footer-links {
        flex-direction: column;
        gap: 12px;
        font-size: 0.66rem;
        letter-spacing: 0.24em;
      }
    }
  </style>
</head>

<body>

  <header class="nav">

    <button class="mobile-menu-button" aria-label="Open menu" onclick="toggleMenu()">
      <span class
